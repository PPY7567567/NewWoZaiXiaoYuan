name: 定时自动跑测试

on:
  workflow_dispatch:
  schedule:
    - cron: '55 16 * * *'

jobs:
  test-job:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 设置北京时间
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: 打印测试结果
        run: |
          echo "✅ 定时自动触发成功！"
          echo "现在时间：$(date +"%Y-%m-%d %H:%M:%S")"
